<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crime Craft — KSP</title>
    <script>
      // Set the theme class before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <!-- Catalyst Web SDK — used only in production (CATALYST_ENABLED=true) for
         hosted login + sign-out. In local dev `/__catalyst/sdk/init.js` 404s
         harmlessly and all usage is guarded by a window.catalyst check. -->
    <script src="https://static.zohocdn.com/catalyst/sdk/js/4.0.0/catalystWebSDK.js"></script>
    <script src="/__catalyst/sdk/init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
