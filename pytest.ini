[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Treat warnings as errors so silent deprecations don't pile up between hack days,
# but ignore the noise we know about.
filterwarnings =
    error
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning

addopts =
    --strict-markers
    --strict-config
    -ra
    --tb=short
